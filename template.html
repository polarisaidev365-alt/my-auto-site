<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Daily</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #222;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .news-container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }
        .news-card {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .news-card h3 {
            margin-top: 0;
        }
        .news-meta {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            margin-top: 30px;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        table th {
            background: #eee;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: #fff;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>AI News Daily</h1>
</header>

<div class="news-container">

    <!-- 主要ニュースカード -->
    {{NEWS_CARDS}}

    <!-- 詳細ニュース一覧 -->
    <h2>詳細ニュース一覧</h2>
    <table>
        <thead>
            <tr>
                <th>タイトル</th>
                <th>概要</th>
                <th>リンク</th>
                <th>公開日</th>
            </tr>
        </thead>
        <tbody>
            {{DETAILS_LIST}}
        </tbody>
    </table>

    <!-- ★ ここに楽天バナーを挿入 ★ -->
    {{RAKUTEN_BANNER}}

</div>

<footer>
    <p>© 2026 AI News Daily</p>
</footer>

</body>
</html>
