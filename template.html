<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI News Daily</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 1px;
    }

    .main-topic {
      max-width: 1100px;
      margin: 40px auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .main-topic img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .main-topic h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .category-section {
      max-width: 1100px;
      margin: 40px auto;
    }

    .category-title {
      font-size: 1.6rem;
      border-left: 6px solid #4a90e2;
      padding-left: 12px;
      margin-bottom: 20px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .news-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      transition: transform 0.2s ease;
    }

    .news-card:hover {
      transform: translateY(-4px);
    }

    .news-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .news-card-content {
      padding: 15px;
    }

    .news-card-content h3 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .news-card-content p {
      font-size: 0.95rem;
      color: #555;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <header>
    <h1>AI News Daily</h1>
  </header>

  <!-- 主要トピック -->
  <section class="main-topic">
    <img src="{{MAIN_IMAGE}}" alt="Main Topic Image" />
    <h2>{{MAIN_TITLE}}</h2>
    <p>{{MAIN_SUMMARY}}</p>
  </section>

  <!-- カテゴリ別ニュース -->
  <section class="category-section">
    <h2 class="category-title">今日の主要AIトピック</h2>

    <div class="news-grid">

      {{NEWS_CARDS}}

    </div>
  </section>

  <footer>
    © 2026 AI News Daily
  </footer>
</body>

<section class="details-section">
  <h2 class="category-title">AI 詳細ニュース（20件）</h2>

  <div class="details-list">
    {{DETAILS_LIST}}
  </div>
</section>

<style>
.details-section {
  max-width: 1100px;
  margin: 60px auto;
  padding: 0 20px;
}

.details-list {
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.detail-item {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  display: flex;
  gap: 20px;
}

.detail-item img {
  width: 220px;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.detail-content h3 {
  margin: 0 0 10px;
  font-size: 1.3rem;
}

.detail-content p {
  margin: 0 0 10px;
  color: #555;
}

.detail-meta {
  font-size: 0.85rem;
  color: #777;
}
</style>

</html>
