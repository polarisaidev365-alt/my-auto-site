name: Daily AI HTML with Image

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          mkdir -p public
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>AI Daily Summary</title>
          </head>
          <body>
            <h1>AI がまとめた今日のトピック</h1>
            <img src="https://example.com/sample.jpg" style="max-width:100%;height:auto;" />
            <section>
              <h2>サマリー</h2>
              <p>ここに AI が生成した要約テキストを入れる。</p>
            </section>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
