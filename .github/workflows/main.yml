name: Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate article with ChatGPT
        run: |
          echo "=== Sending request to OpenAI ==="

          RAW_RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4o-mini",
              "input": "今日のおすすめ記事を日本語で500文字で書いてください。"
            }')

          echo "=== RAW RESPONSE ==="
          echo "$RAW_RESPONSE"

          RESPONSE=$(echo "$RAW_RESPONSE" | jq -r '.output_text')

          echo "=== PARSED RESPONSE ==="
          echo "$RESPONSE"

          echo "<html><body><h1>今日の記事</h1><p>$RESPONSE</p></body></html>" > index.html

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions@example.com"
          git config --local user.name "GitHub Actions"
          git add index.html
          git commit -m "Update article" || echo "No changes to commit"
          git push
